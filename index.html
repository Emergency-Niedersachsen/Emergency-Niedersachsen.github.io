<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Emergency Niedersachsen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Russo+One&display=swap');
  * { box-sizing: border-box; font-family: 'Russo One', sans-serif; }
  body, html { margin: 0; padding: 0; background: linear-gradient(135deg,#0a0a0a,#1a1a1a); color: #f0f0f0; }
  body::before { content:""; position:fixed; top:0; left:0; width:100%; height:100%; background: url('https://cdn.wallpapersafari.com/43/27/X2v8wP.jpg') center/cover; opacity:0.15; z-index: -1; filter: brightness(0.7) contrast(1.2);}
  nav { background: rgba(5,5,5,0.85); display: flex; justify-content: space-between; align-items: center; padding:1rem 2rem; border-bottom:2px solid #00fff7; position: sticky; top:0; z-index: 100; }
  nav .btn { border:2px solid #00fff7; background: transparent; color: #00fff7; padding:0.4rem 0.8rem; margin-left:1rem; cursor:pointer; border-radius:6px; transition: 0.3s; }
  nav .btn:hover { background: #00fff7; color: #010101; }
  .container { max-width: 800px; margin: 2rem auto 4rem; padding: 2rem; background: rgba(10,10,10,0.85); border-radius: 15px; box-shadow: 0 0 20px #00fff7; min-height: 300px;}
  h1, h2 { color: #00fff7; margin-bottom: 1rem; }
  .card { background: #0e0e0e; padding: 1rem; margin-bottom: 1rem; border-radius: 10px; }
  input, textarea, select { width:100%; padding:0.7rem; margin-bottom:0.8rem; border:none; border-radius:8px; background:#121212; color:#00fff7; }
  button.primary { background:#00fff7; color:#010101; padding:0.6rem 1rem; border:none; border-radius:8px; cursor:pointer; }
  button.primary:hover { background:#00d1c1; }
  button.danger { background:#ff0040; color:#fff; padding:0.5rem 1rem; border:none; border-radius:8px; cursor:pointer; }
  button.danger:hover { background:#e60039; }
  .hidden { display: none; }
  footer { background:rgba(5,5,5,0.85); text-align:center; padding:1rem; position: fixed; bottom: 0; width: 100%; display:flex; justify-content:center; align-items:center; gap:8px; color:#00fff7; }
  footer img { height:24px; }
</style>
</head>
<body>

<nav>
  <div>Emergency Niedersachsen</div>
  <div id="navButtons"></div>
</nav>

<div class="container" id="app"></div>

<footer>
  <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" alt="Discord">
  discord.gg/emn
</footer>

<script>
(() => {
  const STORAGE_TEAM = 'emn_team';
  const STORAGE_NEWS = 'emn_news';
  const STORAGE_USER = 'emn_user';
  const ALLOWED_ROLES = ['owner','admin','moderator','developer'];

  let team = JSON.parse(localStorage.getItem(STORAGE_TEAM)) || [{ username: 'owner', password: 'ownerpass', role: 'owner' }];
  let news = JSON.parse(localStorage.getItem(STORAGE_NEWS)) || [];
  let current = JSON.parse(sessionStorage.getItem(STORAGE_USER)) || null;

  const app = document.getElementById('app');
  const nav = document.getElementById('navButtons');

  const saveAll = () => {
    localStorage.setItem(STORAGE_TEAM, JSON.stringify(team));
    localStorage.setItem(STORAGE_NEWS, JSON.stringify(news));
  };

  const setCurrent = u => {
    current = u;
    sessionStorage.setItem(STORAGE_USER, JSON.stringify(u));
    render();
  };

  const navBtn = (text, action) => {
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.textContent = text;
    btn.onclick = action;
    return btn;
  };

  function renderNav() {
    nav.innerHTML = '';
    nav.appendChild(navBtn('Start', () => show('start')));
    nav.appendChild(navBtn('News', () => show('news')));
    nav.appendChild(navBtn('Bewerben', () => show('apply')));

    if (current) {
      if (ALLOWED_ROLES.includes(current.role)) nav.appendChild(navBtn('News erstellen', () => show('addnews')));
      if (current.role === 'owner') nav.appendChild(navBtn('Team verwalten', () => show('team')));
      nav.appendChild(navBtn('Logout', () => { sessionStorage.removeItem(STORAGE_USER); current = null; render(); }));
    } else {
      nav.appendChild(navBtn('Login', () => show('login')));
    }
  }

  function show(page) {
    const pages = { start: renderStart, news: renderNews, addnews: renderAddNews, team: renderTeam, apply: renderApply, login: renderLogin };
    app.innerHTML = '';
    (pages[page] || renderStart)();
  }

  function renderStart() {
    app.innerHTML = `<h1>Startseite</h1><p>Willkommen bei Emergency Niedersachsen!</p>`;
  }

  function renderNews() {
    let html = '<h2>News</h2>';
    if (news.length === 0) {
      html += '<p>Keine News vorhanden.</p>';
    } else {
      news.sort((a,b) => b.date.localeCompare(a.date)).forEach(n => {
        html += `<div class="card"><p>${n.text}</p><small>${n.author} – ${new Date(n.date).toLocaleString()}</small>`;
        if (current && current.role === 'owner') {
          html += ` <button class="danger" onclick="delNews(${n.id})">Löschen</button>`;
        }
        html += '</div>';
      });
    }
    app.innerHTML = html;
  }

  window.delNews = id => {
    news = news.filter(n => n.id !== id);
    saveAll();
    renderNews();
  };

  function renderAddNews() {
    if (!current || !ALLOWED_ROLES.includes(current.role)) return renderNews();
    app.innerHTML = `
      <h2>News erstellen</h2>
      <div class="card">
        <textarea id="nt" placeholder="Text eingeben"></textarea>
        <button class="primary" onclick="addNews()">Posten</button>
      </div>`;
  }

  window.addNews = () => {
    const txt = document.getElementById('nt').value.trim();
    if (txt === '') return alert('Text darf nicht leer sein!');
    news.unshift({ id: Date.now(), text: txt, author: current.username, date: new Date().toISOString() });
    saveAll();
    show('news');
  };

  function renderTeam() {
    if (!current || current.role !== 'owner') return renderStart();
    const rows = team.filter(u => u.username !== 'owner')
                     .map(u => `<tr><td>${u.username}</td><td>${u.role}</td><td><button class="danger" onclick="kick('${u.username}')">Kicken</button></td></tr>`).join('');
    app.innerHTML = `
      <h2>Teamverwaltung</h2>
      <div class="card">
        <input id="nu" placeholder="Benutzername"/>
        <input id="pw" placeholder="Passwort"/>
        <select id="rl">${ALLOWED_ROLES.filter(r => r !== 'owner').map(r => `<option>${r}</option>`).join('')}</select>
        <button class="primary" onclick="addUser()">Hinzufügen</button>
      </div>
      <table>${rows}</table>`;
  }

  window.kick = name => {
    team = team.filter(u => u.username !== name);
    saveAll();
    renderTeam();
  };

  window.addUser = () => {
    const u = document.getElementById('nu').value.trim();
    const p = document.getElementById('pw').value;
    const r = document.getElementById('rl').value;
    if (!u || !p) return alert('Felder ausfüllen!');
    if (team.some(t => t.username === u)) return alert('Existiert schon!');
    team.push({ username: u, password: p, role: r });
    saveAll();
    renderTeam();
  };

  function renderApply() {
    app.innerHTML = `
      <h2>Bewerbung</h2>
      <div class="card">
        <form onsubmit="return sendApp(event)">
          <input id="ar" placeholder="Rolle" required/>
          <input id="dn" placeholder="Discord" required/>
          <textarea id="why" placeholder="Warum?" required></textarea>
          <button class="primary" type="submit">Absenden</button>
        </form>
      </div>`;
  }

  window.sendApp = e => {
    e.preventDefault();
    const r = document.getElementById('ar').value.trim();
    const d = document.getElementById('dn').value.trim();
    const w = document.getElementById('why').value.trim();
    const url = "https://discord.com/api/webhooks/1404585053068984493/G62yUYGKKXiCyYXNmv15ntJrBfUjAzFbWHtI7K-lKQgKew92qINaenaODBlEc9EBDZrY";
    fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ content: ` Bewerbung: Rolle: ${r}, Discord: ${d}, Warum: ${w}` })
    }).then(_=> alert('Gesendet'));
    show('start');
    return false;
  };

  function renderLogin() {
    app.innerHTML = `
      <h2>Login</h2>
      <div class="card">
        <input id="lu" placeholder="Benutzer"/><input id="lp" type="password" placeholder="Passwort"/>
        <button class="primary" onclick="doLogin()">Einloggen</button>
      </div>`;
  }

  window.doLogin = () => {
    const u = document.getElementById('lu').value.trim();
    const p = document.getElementById('lp').value;
    const usr = team.find(x => x.username === u && x.password === p);
    if (!usr) return alert('Falsch!');
    setCurrent(usr);
  };

  function render() {
    renderNav();
    show('start');
  }

  render();
})();
</script>

</body>
</html>
