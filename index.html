<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom right, #2c3e50, #34495e);
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .message-box {
      background: rgba(0, 0, 0, 0.4);
      padding: 40px 60px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 3em;
      margin: 0;
    }

    p {
      margin-top: 15px;
      font-size: 1.2em;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="message-box">
    <h1>Die Webseite ist Offline!</h1>
    <p>Bitte versuchen Sie es später erneut.</p>
  </div>
</body>
</html>
