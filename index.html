<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webseite Offline</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      font-family: 'Roboto', sans-serif;
      color: white;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px 60px;
      text-align: center;
      backdrop-filter: blur(15px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .card h1 {
      font-size: 3rem;
      font-weight: 500;
      margin-bottom: 15px;
    }

    .card p {
      font-size: 1.2rem;
      font-weight: 300;
      color: #ddd;
    }

    @media (max-width: 600px) {
      .card {
        padding: 30px 20px;
      }

      .card h1 {
        font-size: 2rem;
      }

      .card p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚧 Die Webseite ist Offline!</h1>
    <p>Wir arbeiten daran. Bitte schauen Sie später nochmal vorbei.</p>
  </div>
</body>
</html>
