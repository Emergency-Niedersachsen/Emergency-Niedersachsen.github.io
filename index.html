<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webseite Offline</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      font-family: 'Montserrat', sans-serif;
      color: white;
    }

    .card {
      background: linear-gradient(145deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
      border-radius: 20px;
      padding: 50px 70px;
      text-align: center;
      backdrop-filter: blur(25px);
      box-shadow: 0 0 60px rgba(255, 255, 255, 0.08), 0 0 30px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
    }

    .card:hover {
      box-shadow: 0 0 80px rgba(255, 255, 255, 0.15), 0 0 40px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-size: 3rem;
      font-weight: 600;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #ffdde1, #ee9ca7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 1.2rem;
      font-weight: 400;
      color: #ddd;
    }

    @media (max-width: 600px) {
      .card {
        padding: 30px 20px;
      }

      h1 {
        font-size: 2rem;
      }

      p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚧 Die Webseite ist Offline!</h1>
    <p>Wir arbeiten im Hintergrund. Bitte versuchen Sie es später noch einmal.</p>
  </div>
</body>
</html>
